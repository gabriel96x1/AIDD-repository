name: Go Code Quality

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'aidd/mcp/**'
      - '.github/workflows/go-lint.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'aidd/mcp/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.3'
        cache: true
        cache-dependency-path: aidd/mcp/go.sum
    
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
        working-directory: aidd/mcp
        args: --timeout=5m
    
    - name: Run go fmt
      working-directory: aidd/mcp
      run: |
        if ! go fmt ./...; then
          echo "go fmt failed"
          exit 1
        fi
    
    - name: Run go vet
      working-directory: aidd/mcp
      run: go vet ./...
